ollama:
  host: "http://127.0.0.1:11434"
  timeout_seconds: 300
  retry_count: 1

models:
  classify: "qwen3:1.7b"
  reason: "qwen2.5:14b"
  code: "qwen2.5-coder:7b"
  embed: "qwen3-embedding:0.6b"
  summarize: "ministral-3:3b"
  synthesize: "gpt-oss:20b"
  vision: "qwen3-vl:2b"
  fallback:
    classify: "deepseek-r1:1.5b"
    reason: "qwen3:1.7b"
    code: "deepseek-coder:1.3b"
    summarize: "qwen3:1.7b"
    synthesize: "qwen2.5-coder:14b"

workspace:
  base_dir: "~/.forge/workspaces"
  max_file_size_kb: 2048000
  chunk_max_lines: 200000
  chunk_overlap_lines: 10
  max_chunks_per_file: 200000

retrieval:
  max_context_chunks: 150
  similarity_threshold: 0.25
  embedding_batch_size: 10
  scan_ignore:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "build"
    - "dist"
    - ".idea"
    - ".vscode"
    - "target"
    - "vendor"
    - ".gradle"
    - "bin"
    - "obj"

voice:
  whisper_model: "base"
  whisper_model_dir: "~/.forge/models/whisper"
  language: "auto"
  max_recording_sec: 30
  silence_threshold_db: -40.0
  silence_duration_ms: 1500

ui:
  show_trace: true
  show_evidence: true
  streaming: true

multi_repo:
  satellites: []
  auto_clone: false
  shallow_clone: true
  clone_base_dir: "~/.forge/repos"

scale:
  parallel_scan_threads: 8
  scan_batch_size: 500
  incremental_scan: true
  fts5_enabled: true
  module_embedding_budget: 8000000
  module_top_k: 20
  similarity_search_limit: 50000000
  token_budget: 128000000
  module_summary_cache: true

evolution:
  enabled: true
  collect_training_data: true
  auto_validate_on_success: true
  quality_threshold: 0.6
  model_export_dir: "~/.forge/models/exports"
  dataset_format: "jsonl"
  pii_filter_enabled: true

agents:
  enabled: true
  always_hot:
    - "qwen3:1.7b"
    - "qwen2.5:14b"
  specialist_models:
    CODE: "qwen2.5-coder:7b"
    EMBED: "qwen3-embedding:0.6b"
    SUMMARIZE: "ministral-3:3b"
    VISION: "qwen3-vl:2b"
  preload_on_startup: true
  max_total_memory_gb: 12.0
  heavy_model_threshold_gb: 6.0
  keep_alive_minutes: 10
