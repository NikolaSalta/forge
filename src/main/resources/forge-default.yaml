ollama:
  host: "http://127.0.0.1:11434"
  timeout_seconds: 300
  retry_count: 1

models:
  classify: "qwen3:1.7b"
  reason: "deepseek-r1:8b"
  code: "qwen2.5-coder:14b"
  embed: "nomic-embed-text"
  summarize: "ministral-3:8b"
  vision: "qwen2.5vl:7b"
  fallback:
    classify: "deepseek-r1:1.5b"
    reason: "qwen2.5:14b"
    code: "qwen2.5-coder:7b"
    summarize: "qwen3:1.7b"

workspace:
  base_dir: "~/.forge/workspaces"
  max_file_size_kb: 2048000
  chunk_max_lines: 200000
  chunk_overlap_lines: 10
  max_chunks_per_file: 200000

retrieval:
  max_context_chunks: 200000
  similarity_threshold: 0.50
  embedding_batch_size: 10
  scan_ignore:
    - "node_modules"
    - ".git"
    - "__pycache__"
    - "build"
    - "dist"
    - ".idea"
    - ".vscode"
    - "target"
    - "vendor"
    - ".gradle"
    - "bin"
    - "obj"

voice:
  whisper_model: "base"
  whisper_model_dir: "~/.forge/models/whisper"
  language: "auto"
  max_recording_sec: 30
  silence_threshold_db: -40.0
  silence_duration_ms: 1500

ui:
  show_trace: true
  show_evidence: true
  streaming: true

intellij:
  enabled: true
  module_priorities:
    - "platform/platform-api"
    - "platform/platform-impl"
    - "platform/core-api"
    - "platform/core-impl"
    - "platform/lang-api"
    - "platform/lang-impl"
  skip_modules:
    - "images"
  max_modules_deep_scan: 500000
  extension_point_cache_hours: 24

multi_repo:
  satellites: []
  auto_clone: false
  shallow_clone: true
  clone_base_dir: "~/.forge/repos"

scale:
  parallel_scan_threads: 8
  scan_batch_size: 500
  incremental_scan: true
  fts5_enabled: true
  module_embedding_budget: 8000000
  module_top_k: 20
  similarity_search_limit: 50000000
  token_budget: 128000000
  module_summary_cache: true
